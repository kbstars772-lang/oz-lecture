<!DOCTYPE HTML>
<html>
    <head>
        <title>day09</title>
        </head>
        <body>
            <h1>day09</h1>
            <script>
                // var let, const 실습
                var name = 'oz';
                var name = 'oz2';
                console.log(name);

                // 변수 let
                let age = 25;
                // let age = 30;
                age = 30;
                console.log(age);
                // 상수 const
                const pi = 3.14;
                // pi = 3.1; // 재할당 안됨
                console.log(pi);

                // 변수 선언 실습
                var greeting = '안녕하세요'; //오래 된 방식
                let username = '홍길동'; // 변경 가능한 변수
                const maxAttempts = 3; // (변경 불가능한) 고정 상수

                console.log(greeting);
                username = '김영희'; // 재할당
                console.log(username); // 김영희
                console.log(maxAttempts); // 3
                //string 문자열
                let string1 = "작은따옴표('')가 포함됩니다."
                let string2 = '큰따옴표("")가 포함됩니다'
                console.log(string1);
                console.log(string2);
                
                // string 문자열 연결
                let stringA = "문자열" + "연결";
                let stringB = string1 + " " + string2;
                console.log("stringA", stringA);
                console.log("stringB", stringB);

                //es6 문자열 (백틱)
                let myName = "sungju"
                let oldString = "나의 이름은" + myName + "입니다."
                let es6String = "나의 이름은 ${myName}입니다."
                console.log(oldString);
                console.log(es6String);
            </script>
        </body>
</html>
